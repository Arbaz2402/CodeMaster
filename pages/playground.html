<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Playground | CodeMaster</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/playground.css">
  <style>
    .project-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .project-modal.show {
      display: flex;
    }
    .modal-content {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      color: white;
      margin: 0;
    }
    .close-modal {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .project-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .project-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .project-info h4 {
      color: white;
      margin: 0 0 4px 0;
      font-size: 0.95rem;
    }
    .project-info span {
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    .project-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: 8px;
      padding: 4px;
    }
    .project-actions button:hover {
      color: white;
    }
    .project-actions button.delete:hover {
      color: #ef4444;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }
    .header-right button {
      margin-left: 8px;
    }
    .current-project {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-right: 16px;
    }
  </style>
</head>
<body class="playground-body">

  <!-- Header -->
  <header class="playground-header glass">
    <div class="header-left">
      <a href="../index.html" class="logo">
        <i class="fas fa-code"></i>
        <span>Code<span>Master</span></span>
      </a>
      <ul class="nav-links" style="display: flex; gap: 20px; margin-left: 30px; list-style: none;">
        <li><a href="../index.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Home</a></li>
        <li><a href="courses.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Courses</a></li>
        <li><a href="video-learning.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Learning</a></li>
        <li><a href="dashboard.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Dashboard</a></li>
      </ul>
    </div>
    <div class="header-right">
      <span class="current-project" id="current-project-name">Untitled Project</span>
      <button class="btn-outline btn-sm" id="load-project-btn"><i class="fas fa-folder-open"></i> Load</button>
      <button class="btn-outline btn-sm" id="save-project-btn"><i class="fas fa-save"></i> Save</button>
      <button class="btn-outline btn-sm" id="new-project-btn"><i class="fas fa-plus"></i> New</button>
      <button class="btn-outline btn-sm" id="save-btn"><i class="fas fa-download"></i> Save to PC</button>
      <button class="btn-outline btn-sm" id="open-external-btn"><i class="fas fa-external-link-alt"></i> Open in Browser</button>
      <button class="btn-primary btn-sm" id="run-btn"><i class="fas fa-play"></i> Run Code</button>
      <a href="profile.html" class="user-avatar" id="user-avatar-link"><img src="https://ui-avatars.com/api/?name=User&background=random" alt="User" id="user-avatar-img"></a>
    </div>
  </header>

  <main class="playground-container">
    <!-- Editor Section -->
    <div class="editor-section">
      <div class="editor-tabs">
        <button class="editor-tab active" data-lang="html"><i class="fab fa-html5"></i> HTML</button>
        <button class="editor-tab" data-lang="css"><i class="fab fa-css3-alt"></i> CSS</button>
        <button class="editor-tab" data-lang="js"><i class="fab fa-js"></i> JS</button>
      </div>
      <div class="editor-content">
        <textarea id="html-code" class="code-input active" placeholder="Enter HTML here..."></textarea>
        <textarea id="css-code" class="code-input" placeholder="Enter CSS here..."></textarea>
        <textarea id="js-code" class="code-input" placeholder="Enter JS here..."></textarea>
      </div>
    </div>

    <!-- Preview Section -->
    <div class="preview-section">
      <div class="preview-header">
        <span><i class="fas fa-eye"></i> Live Preview</span>
        <div class="preview-actions">
          <button id="clear-btn">Clear</button>
          <button id="refresh-btn"><i class="fas fa-sync-alt"></i></button>
        </div>
      </div>
      <div class="preview-window">
        <iframe id="preview-iframe"></iframe>
      </div>
      <div class="console-window">
        <div class="console-header">Console</div>
        <div id="console-output">
          <span class="system-msg">> CodeMaster Playground initialized.</span>
        </div>
        <div class="console-input-wrapper">
          <span>></span>
          <input type="text" id="console-input" placeholder="Type JavaScript here and press Enter..." autocomplete="off">
        </div>
      </div>
    </div>
  </main>

  <!-- Load Project Modal -->
  <div class="project-modal" id="load-project-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Load Project</h2>
        <button class="close-modal" id="close-load-modal">&times;</button>
      </div>
      <div id="projects-list"></div>
    </div>
  </div>

  <!-- Save Project Modal -->
  <div class="project-modal" id="save-project-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Save Project</h2>
        <button class="close-modal" id="close-save-modal">&times;</button>
      </div>
      <form id="save-project-form">
        <div class="form-group">
          <label for="project-title">Project Title</label>
          <input type="text" id="project-title" placeholder="Enter project title" required>
        </div>
        <div style="display: flex; gap: 10px;">
          <button type="submit" class="btn-primary">Save</button>
          <button type="button" class="btn-outline" id="cancel-save-btn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="../js/playground.js"></script>
</body>
</html>
