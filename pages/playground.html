<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Playground | CodeMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/playground.css">
</head>
<body class="playground-body">

    <!-- Header -->
    <header class="playground-header glass">
        <div class="header-left">
            <a href="../index.html" class="logo">
                <i class="fas fa-code"></i>
                <span>Code<span>Master</span></span>
            </a>
            <ul class="nav-links" style="display: flex; gap: 20px; margin-left: 30px; list-style: none;">
                <li><a href="../index.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Home</a></li>
                <li><a href="courses.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Courses</a></li>
                <li><a href="video-learning.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Learning</a></li>
                <li><a href="dashboard.html" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">Dashboard</a></li>
            </ul>
        </div>
        <div class="header-right">
            <button class="btn-outline btn-sm" id="save-btn"><i class="fas fa-download"></i> Save to PC</button>
            <button class="btn-outline btn-sm" id="open-external-btn"><i class="fas fa-external-link-alt"></i> Open in Browser</button>
            <button class="btn-primary btn-sm" id="run-btn"><i class="fas fa-play"></i> Run Code</button>
            <a href="profile.html" class="user-avatar"><img src="https://ui-avatars.com/api/?name=User&background=random" alt="User"></a>
        </div>
    </header>

    <main class="playground-container">
        <!-- Editor Section -->
        <div class="editor-section">
            <div class="editor-tabs">
                <button class="editor-tab active" data-lang="html"><i class="fab fa-html5"></i> HTML</button>
                <button class="editor-tab" data-lang="css"><i class="fab fa-css3-alt"></i> CSS</button>
                <button class="editor-tab" data-lang="js"><i class="fab fa-js"></i> JS</button>
            </div>
            <div class="editor-content">
                <textarea id="html-code" class="code-input active" placeholder="Enter HTML here..."></textarea>
                <textarea id="css-code" class="code-input" placeholder="Enter CSS here..."></textarea>
                <textarea id="js-code" class="code-input" placeholder="Enter JS here..."></textarea>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <div class="preview-header">
                <span><i class="fas fa-eye"></i> Live Preview</span>
                <div class="preview-actions">
                    <button id="clear-btn">Clear</button>
                    <button id="refresh-btn"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
            <div class="preview-window">
                <iframe id="preview-iframe"></iframe>
            </div>
            <div class="console-window">
                <div class="console-header">Console</div>
                <div id="console-output">
                    <span class="system-msg">> CodeMaster Playground initialized.</span>
                </div>
                <div class="console-input-wrapper">
                    <span>></span>
                    <input type="text" id="console-input" placeholder="Type JavaScript here and press Enter..." autocomplete="off">
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/playground.js"></script>
</body>
</html>
