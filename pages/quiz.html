<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: React Hooks | CodeMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/quiz.css">
</head>
<body class="quiz-body">

    <div class="quiz-container">
        <!-- Quiz Header -->
        <header class="quiz-header card">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="dashboard.html" class="back-btn" style="color: var(--text-secondary); font-size: 1.2rem; transition: color 0.3s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-secondary)'"><i class="fas fa-arrow-left"></i></a>
                <div class="quiz-info">
                    <h2>React Hooks Quiz</h2>
                    <p>Question <span id="current-q">1</span> of <span id="total-q">5</span></p>
                </div>
            </div>
            <div class="quiz-timer">
                <i class="fas fa-clock"></i>
                <span id="timer">02:00</span>
            </div>
        </header>

        <!-- Quiz Progress -->
        <div class="quiz-progress-bar">
            <div class="progress-fill" id="quiz-progress" style="width: 20%;"></div>
        </div>

        <!-- Question Card -->
        <div class="question-card card" id="quiz-screen">
            <h3 id="question-text">Loading question...</h3>
            <div class="options-grid" id="options-container">
                <!-- Options will be here -->
            </div>
            <div class="quiz-footer">
                <button class="btn-outline" id="prev-btn" disabled>Previous</button>
                <button class="btn-primary" id="next-btn">Next Question</button>
            </div>
        </div>

        <!-- Result Screen (Hidden by default) -->
        <div class="result-screen card" id="result-screen" style="display: none;">
            <div class="result-icon"><i class="fas fa-trophy"></i></div>
            <h2>Quiz Completed!</h2>
            <p class="score-text">You scored <span id="final-score">0</span> out of <span id="final-total">5</span></p>
            <div class="result-stats">
                <div class="res-stat">
                    <span id="accuracy">0%</span>
                    <p>Accuracy</p>
                </div>
                <div class="res-stat">
                    <span id="time-taken">0s</span>
                    <p>Time Taken</p>
                </div>
            </div>
            <div class="result-btns">
                <button class="btn-outline" onclick="location.reload()">Retry Quiz</button>
                <a href="dashboard.html" class="btn-primary">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="../js/quiz.js"></script>
</body>
</html>
