<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CodeMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body class="dashboard-body">

    <!-- Dashboard Sidebar -->
    <aside class="dashboard-sidebar glass">
        <div class="sidebar-header">
            <a href="../index.html" class="logo">
                <i class="fas fa-code"></i>
                <span>Code<span>Master</span></span>
            </a>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li><a href="courses.html"><i class="fas fa-book"></i> My Courses</a></li>
            <li><a href="playground.html"><i class="fas fa-terminal"></i> Playground</a></li>
            <li><a href="quiz.html"><i class="fas fa-question-circle"></i> Quizzes</a></li>
            <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
          </ul>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="User">
                <div>
                    <p class="user-name">John Doe</p>
                    <p class="user-status">Pro Member</p>
                </div>
            </div>
            <a href="#" class="logout-btn btn-logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-header">
            <div class="mobile-menu-btn" style="margin-right: 20px;">
                <i class="fas fa-bars"></i>
            </div>
            <div class="header-left">
                <h2>My Courses</h2>
            </div>
            <div class="header-right">
                <div class="notification-btn"><i class="fas fa-bell"></i><span class="dot"></span></div>
                <div class="streak-badge"><i class="fas fa-fire"></i> 15 Day Streak</div>
            </div>
        </header>

        <!-- Continue Learning -->
        <section class="continue-learning card">
            <h3>Continue Learning</h3>
            <div class="course-progress-list" id="enrolled-courses-list">
                <p style="color: #94a3b8; text-align: center; padding: 2rem;">Loading your courses...</p>
            </div>
            <a href="courses.html" class="view-all">Browse All Courses <i class="fas fa-arrow-right"></i></a>
        </section>
    </main>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
