<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | CodeMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/courses.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fas fa-code"></i>
                <span>Code<span>Master</span></span>
            </a>
            
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="courses.html" class="active">Courses</a></li>
                <li><a href="playground.html">Playground</a></li>
                <li><a href="video-learning.html">Learning</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>

            <div class="nav-actions" id="nav-actions">
            </div>

            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <main class="courses-page section-padding">
        <div class="container">
            <!-- Search & Header -->
            <div class="courses-header" data-aos="fade-down">
                <h1>Browse Our <span class="text-gradient">Courses</span></h1>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="course-search" placeholder="Search for courses, skills, or mentors...">
                    <button class="btn-primary">Search</button>
                </div>
            </div>

            <div class="courses-layout">
                <!-- Sidebar Filters -->
                <aside class="filters-sidebar" data-aos="fade-right">
                    <div class="filter-section">
                        <h3>Categories</h3>
                        <div class="filter-options">
                            <label class="checkbox-container">
                                <input type="checkbox" checked> Web Development
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox"> Data Science
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox"> Mobile Apps
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox"> UI/UX Design
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Level</h3>
                        <div class="filter-options">
                            <label class="checkbox-container">
                                <input type="checkbox"> Beginner
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox"> Intermediate
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox"> Advanced
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Rating</h3>
                        <div class="filter-options">
                            <label class="checkbox-container">
                                <input type="checkbox" value="4.5"> 4.5 & Up
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container">
                                <input type="checkbox" value="4.0"> 4.0 & Up
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    </div>
                </aside>

                <!-- Course Grid -->
                <div class="courses-content">
                    <div class="sort-bar">
                        <p>Showing <span id="course-count">12</span> courses</p>
                        <div class="sort-options">
                            <span>Sort by:</span>
                            <select id="sort-select">
                                <option value="popular">Most Popular</option>
                                <option value="newest">Newest</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                            </select>
                        </div>
                    </div>

                    <div class="course-grid" id="course-grid">
                    </div>

                    <!-- Pagination -->
                    <div class="pagination">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-bottom">
            <p>&copy; 2026 CodeMaster Education. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/courses.js"></script>
    <script>
        // Check if user is logged in
        function checkAuth() {
            const user = getUser();
            const navActions = document.getElementById('nav-actions');
            if (user) {
                navActions.innerHTML = `
                    <a href="profile.html" class="btn-outline btn-sm">${user.name}</a>
                    <button class="btn-primary btn-sm" id="logout-btn">Log Out</button>
                `;
                document.getElementById('logout-btn').addEventListener('click', () => {
                    removeToken();
                    removeUser();
                    checkAuth();
                });
            } else {
                navActions.innerHTML = `
                    <button class="btn-outline btn-sm" id="login-btn">Log In</button>
                    <button class="btn-primary btn-sm" id="register-btn">Sign Up</button>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });
    </script>
</body>
</html>
